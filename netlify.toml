[build]
  publish = "."
  command = ""

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200
  force = true

[[redirects]]
  from = "/php-backup/*"
  to = "/"
  status = 404

[[redirects]]
  from = "/form-submissions/*"
  to = "/"
  status = 404

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/realtor-campaigns"
  to = "/realtor-campaigns.html"
  status = 200

[[redirects]]
  from = "/homeowner-campaigns"
  to = "/homeowner-campaigns.html"
  status = 200

[[redirects]]
  from = "/cold-outreach"
  to = "/cold-outreach.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
